      - '&cShift+ЛКМ: очистить префикс'

    format-menu-slot: 23
    format-button-material: 'HEAD:eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvN2E3ZDZjMGFjY2QyZTljY2FlZmE5NmI5NDM4ZDZlMjAyZmVjNzk1YWNmNzA3MmJjZmQ5Y2Q5ZDRiNWEzMmIwZSJ9fX0='
