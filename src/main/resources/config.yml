settings:
  layout:
    fullname: '{staff_prefix}{group_prefix}{custom_prefix}{clan_tag}{prefix_separator}{group_color}{player_name}{suffix_separator}{suffix_title}{suffix_icon}'
    preview: '{staff_prefix}{group_prefix}{custom_prefix}{clan_tag}{prefix_separator}{group_color}{player_name}{suffix_separator}{suffix_title}{suffix_icon}'
    prefix-separator: ' &8| &f'
    suffix-separator: ' &8| &f'
  unlock-node-format: 'sopprefix.unlocked.%segment%.%id%'
  format-unlock-node-format: 'sopprefix.unlocked.format.%segment%.%id%'
  active-meta-key-format: 'sopprefix.active.%segment%'
  active-format-meta-key-format: 'sopprefix.active.format.%segment%'
